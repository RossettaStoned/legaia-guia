<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a2818"/>
      <stop offset="50%" stop-color="#0d1f3c"/>
      <stop offset="100%" stop-color="#051510"/>
    </linearGradient>
  </defs>

  <!-- Fondo con gradiente premium -->
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>

  <!-- Raíces -->
  <path d="M236,370 Q210,398 192,424" fill="none" stroke="#5DCAA5" stroke-width="14" stroke-linecap="round" opacity="0.65"/>
  <path d="M256,378 Q256,406 256,430" fill="none" stroke="#5DCAA5" stroke-width="14" stroke-linecap="round" opacity="0.65"/>
  <path d="M276,370 Q302,398 320,424" fill="none" stroke="#5DCAA5" stroke-width="14" stroke-linecap="round" opacity="0.65"/>

  <!-- Tronco -->
  <rect x="234" y="290" width="44" height="90" rx="10" fill="#5DCAA5" opacity="0.7"/>

  <!-- Copa: triángulos apilados (capa trasera/oscura) -->
  <polygon points="256,68  88,300  424,300" fill="#1a4d35" opacity="0.85"/>
  <polygon points="256,96  112,296 400,296" fill="#1f6642" opacity="0.75"/>

  <!-- Copa: triángulos medios -->
  <polygon points="256,108 104,318 408,318" fill="#1a4d35" opacity="0.9"/>
  <polygon points="256,136 128,314 384,314" fill="#27854f" opacity="0.9"/>

  <!-- Copa: triángulos frontales -->
  <polygon points="256,150 96,340  416,340" fill="#1f5c42" opacity="0.85"/>
  <polygon points="256,178 120,336 392,336" fill="#2d8f5a" opacity="0.95"/>

  <!-- Núcleo brillante -->
  <circle cx="256" cy="196" r="52" fill="#5DCAA5" opacity="0.9"/>
  <circle cx="256" cy="196" r="32" fill="#a8f0d8"/>
  <circle cx="256" cy="196" r="16" fill="white" opacity="0.92"/>

  <!-- Partículas de luz -->
  <circle cx="168" cy="168" r="9"  fill="#5DCAA5" opacity="0.65"/>
  <circle cx="346" cy="158" r="7"  fill="#5DCAA5" opacity="0.55"/>
  <circle cx="200" cy="102" r="7"  fill="#a8f0d8" opacity="0.8"/>
  <circle cx="318" cy="118" r="8"  fill="#a8f0d8" opacity="0.7"/>
  <circle cx="256" cy="76"  r="6"  fill="white"   opacity="0.75"/>
  <circle cx="232" cy="60"  r="4"  fill="white"   opacity="0.6"/>
  <circle cx="280" cy="56"  r="4"  fill="white"   opacity="0.6"/>
</svg>
